<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WorkTime Pro</title>
    <style>
        :root { --primary: #6C5CE7; --bg: #F0F3F7; --card: #FFFFFF; --danger: #FF7675; --secondary: #00B894; --text: #2D3436; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; min-height: 100vh; }
        .container { max-width: 500px; margin: auto; }
        .card { background: var(--card); border-radius: 20px; padding: 18px; box-shadow: 0 8px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h1 { text-align: center; color: var(--primary); margin: 10px 0; }
        label { display: block; margin-bottom: 4px; font-weight: 700; text-align: center; color: var(--primary); font-size: 14px; }
        input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #DDD; margin-bottom: 12px; box-sizing: border-box; text-align: center; font-size: 16px; background: #FFF; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; font-size: 16px; cursor: pointer; color: white; margin-bottom: 8px; }
        .btn-save { background: var(--primary); }
        .history-item { background: var(--card); padding: 12px; border-radius: 15px; margin-bottom: 8px; border-right: 4px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        #syncStatus { font-size: 11px; text-align: center; color: #888; margin-bottom: 10px; height: 15px; font-weight: bold; }
        #loginScreen, #appScreen, #adminScreen { display: none; }
        .badge { background: var(--primary); color: white; padding: 4px 10px; border-radius: 8px; font-size: 11px; }
    </style>
</head>
<body>

<div class="container">
    <div id="syncStatus">מתחבר למערכת...</div>

    <div id="loginScreen">
        <h1>WorkTime Pro</h1>
        <div class="card">
            <select id="userSelect"></select>
            <input type="password" id="pass" placeholder="סיסמה">
            <button class="btn btn-save" onclick="login()">כניסה</button>
            <hr style="opacity:0.1; margin:20px 0;">
            <input type="text" id="newName" placeholder="שם עובד חדש">
            <input type="password" id="newPass" placeholder="סיסמה">
            <button class="btn" style="background:var(--secondary)" onclick="addUser()">צור חשבון חדש</button>
        </div>
    </div>

    <div id="appScreen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <span class="badge" id="userBadge"></span>
            <button onclick="logout()" style="background:none; border:none; color:var(--danger); font-weight:bold;">יציאה ✖</button>
        </div>
        <div class="card">
            <input type="hidden" id="editIndex" value="-1">
            <label>תאריך</label><input type="date" id="workDate">
            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label>כניסה</label><input type="time" id="startTime"></div>
                <div style="flex:1;"><label>יציאה</label><input type="time" id="endTime"></div>
            </div>
            <label>שכר (₪)</label><input type="number" id="hourlyRate" value="50">
            <button class="btn btn-save" id="mainBtn" onclick="saveShift()">שמור משמרת</button>
            <div id="adminLinkArea"></div>
        </div>
        <div id="historyList"></div>
    </div>

    <div id="adminScreen">
        <h1>ניהול עובדים</h1>
        <div class="card" id="adminList"></div>
        <button class="btn" style="background:#2D3436" onclick="showApp()">חזרה</button>
    </div>
</div>

<script>
    const CONFIG = {
        apiKey: "$2a$10$BIXzeiUj1VK8RV.YMZ4hNe7.GMH3.XNP2lSRhX/JrzfX2NidTZpNG",
        binId: "69d6000410716a4d5de597ef"
    };

    let db = {};
    try {
        const saved = localStorage.getItem('wt_db');
        if (saved) db = JSON.parse(saved);
    } catch(e) { db = {}; }

    let currentUser = null;
    const ADMIN_NAME = "אבי לביא";

    function updateSyncStatus(msg) { document.getElementById('syncStatus').innerText = msg; }

    async function saveToCloud() {
        localStorage.setItem('wt_db', JSON.stringify(db));
        updateSyncStatus("מגבה נתונים...");
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.binId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': CONFIG.apiKey },
                body: JSON.stringify(db)
            });
            updateSyncStatus("✅ המידע שמור בענן");
        } catch (e) { updateSyncStatus("⚠️ שגיאת גיבוי"); }
    }

    async function loadData() {
        // מציג מיד אם יש נתונים
        if (db && Object.keys(db).length > 0) showLogin();

        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.binId}/latest`, {
                headers: { 'X-Master-Key': CONFIG.apiKey }
            });
            const data = await res.json();
            if (data && data.record) {
                db = data.record;
                localStorage.setItem('wt_db', JSON.stringify(db));
                updateSyncStatus("✅ הנתונים סונכרנו");
                showLogin();
            }
        } catch (e) { 
            updateSyncStatus("עובד ללא חיבור");
            if (Object.keys(db).length > 0) showLogin();
            else {
                db = {}; // אתחול למניעת תקיעה
                showLogin();
            }
        }
    }

    function hideAll() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appScreen').style.display = 'none';
        document.getElementById('adminScreen').style.display = 'none';
    }

    function showLogin() {
        hideAll();
        const select = document.getElementById('userSelect');
        const names = Object.keys(db);
        select.innerHTML = names.length ? names.map(n => `<option value="${n}">${n}</option>`).join('') : '<option disabled>אין משתמשים</option>';
        document.getElementById('loginScreen').style.display = 'block';
    }

    function login() {
        const n = document.getElementById('userSelect').value;
        const p = document.getElementById('pass').value;
        if (db[n] && db[n].password === p) {
            currentUser = n;
            showApp();
        } else alert("סיסמה שגויה");
    }

    function showApp() {
        hideAll();
        document.getElementById('appScreen').style.display = 'block';
        document.getElementById('userBadge').innerText = (currentUser === ADMIN_NAME) ? "ניהול: " + currentUser : currentUser;
        
        const now = new Date();
        const offset = now.getTimezoneOffset() * 60000;
        document.getElementById('workDate').value = new Date(now - offset).toISOString().split('T')[0];
        
        const adminArea = document.getElementById('adminLinkArea');
        adminArea.innerHTML = (currentUser === ADMIN_NAME) ? `<button class="btn" style="background:#2D3436; margin-top:10px;" onclick="showAdmin()">ניהול עובדים 🛠️</button>` : "";
        
        renderHistory();
    }

    async function saveShift() {
        const date = document.getElementById('workDate').value;
        const start = document.getElementById('startTime').value;
        const end = document.getElementById('endTime').value;
        const rate = parseFloat(document.getElementById('hourlyRate').value);
        if (!date || !start || !end) return alert("מלא פרטים");

        const todayStr = new Date(new Date() - (new Date().getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        if (date > todayStr) return alert("לא ניתן לרשום לעתיד");

        const sTime = new Date(`${date}T${start}`);
        let eTime = new Date(`${date}T${end}`);
        if (eTime <= sTime) eTime.setDate(eTime.getDate() + 1);

        const diff = (eTime - sTime) / (1000 * 60 * 60);
        const total = (diff * rate + diff * 2.29).toFixed(2);
        const shift = { date, start, end, hours: diff.toFixed(2), total };

        if (!db[currentUser].shifts) db[currentUser].shifts = [];
        db[currentUser].shifts.push(shift);

        await saveToCloud();
        renderHistory();
    }

    function renderHistory() {
        const list = document.getElementById('historyList');
        const shifts = db[currentUser].shifts || [];
        list.innerHTML = shifts.slice(-20).map((s, i) => `
            <div class="history-item">
                <div><b>${s.date.split('-').reverse().join('/')}</b><br><small>${s.start}-${s.end}</small></div>
                <div style="text-align:left;"><b style="color:var(--secondary)">₪${s.total}</b></div>
            </div>
        `).reverse().join('');
    }

    function showAdmin() {
        hideAll();
        document.getElementById('adminScreen').style.display = 'block';
        const list = document.getElementById('adminList');
        list.innerHTML = Object.keys(db).map(name => {
            const sum = (db[name].shifts || []).reduce((a, b) => a + parseFloat(b.total), 0);
            return `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;">
                <span>${name}</span>
                <span><b>₪${sum.toFixed(2)}</b> <button class="mini-btn" style="background:var(--primary); color:white; border:none; border-radius:5px; padding:4px 8px; margin-right:5px;" onclick="viewUser('${name}')">צפה</button></span>
            </div>`;
        }).join('');
    }

    function viewUser(name) { currentUser = name; showApp(); }
    function addUser() {
        const n = document.getElementById('newName').value.trim();
        const p = document.getElementById('newPass').value;
        if (!n || !p) return alert("מלא פרטים");
        if (!db[n]) db[n] = { password: p, shifts: [] };
        saveToCloud();
        showLogin();
    }
    function logout() { currentUser = null; showLogin(); }

    loadData();
</script>
</body>
</html>
