<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WorkTime Pro Admin Bypass</title>
    <style>
        :root { --primary: #6C5CE7; --bg: #F0F3F7; --card: #FFFFFF; --danger: #FF7675; --secondary: #00B894; --text: #2D3436; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; min-height: 100vh; }
        .container { max-width: 600px; margin: auto; }
        .card { background: var(--card); border-radius: 20px; padding: 18px; box-shadow: 0 8px 15px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.03); }
        label { display: block; margin-bottom: 8px; font-weight: 700; color: var(--primary); font-size: 14px; text-align: center; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #DDD; margin-bottom: 12px; box-sizing: border-box; text-align: center; font-size: 16px; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 800; font-size: 16px; cursor: pointer; color: white; margin-bottom: 10px; }
        .btn-save { background: var(--primary); }
        .btn-admin { background: #2D3436; margin-top: 10px; }
        .admin-summary-all { background: #2d3436; color: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; border-bottom: 5px solid var(--secondary); }
        .admin-user-card { border-right: 6px solid var(--primary); padding: 15px; margin-bottom: 15px; background: white; border-radius: 15px; }
        .admin-header { display: flex; justify-content: space-between; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; margin-bottom: 10px; }
        .admin-stats { display: flex; gap: 10px; }
        .stat-item { flex: 1; background: #f8f9fd; padding: 10px; border-radius: 12px; text-align: center; }
        .stat-val { font-size: 17px; font-weight: 800; }
        #syncStatus { font-size: 11px; text-align: center; color: #888; margin-bottom: 10px; padding: 10px; background: #fff; border-radius: 10px; }
        #loginScreen, #appScreen, #adminScreen { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="syncStatus">⏳ מנסה לעקוף חסימת דפדפן...</div>

    <div id="loginScreen">
        <h1 style="text-align:center; color:var(--primary);">WorkTime Pro</h1>
        <div class="card">
            <label>בחר משתמש</label>
            <select id="userSelect"></select>
            <input type="password" id="pass" placeholder="סיסמה">
            <button class="btn btn-save" onclick="login()">כניסה</button>
            <hr style="opacity:0.1; margin:20px 0;">
            <input type="text" id="newName" placeholder="שם עובד חדש">
            <input type="password" id="newPass" placeholder="סיסמה">
            <button class="btn" style="background:var(--secondary)" onclick="addUser()">פתח חשבון חדש</button>
        </div>
    </div>

    <div id="appScreen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <span id="userBadge" style="background:var(--primary); color:white; padding:6px 15px; border-radius:12px; font-size:13px; font-weight:bold;"></span>
            <button onclick="logout()" style="background:none; border:none; color:var(--danger); font-weight:bold; cursor:pointer;">יציאה ✖</button>
        </div>
        <div class="card">
            <label>מקום עבודה</label>
            <input type="text" id="jobName" placeholder="איפה עבדת?">
            <label>תאריך</label>
            <input type="date" id="workDate">
            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label>כניסה</label><input type="time" id="startTime"></div>
                <div style="flex:1;"><label>יציאה</label><input type="time" id="endTime"></div>
            </div>
            <button class="btn btn-save" onclick="saveShift()">שמור משמרת</button>
            <div id="adminLinkArea"></div>
        </div>
        <div id="historyList"></div>
    </div>

    <div id="adminScreen">
        <div class="admin-summary-all">
            <small>סה"כ משכורות (כל העובדים)</small>
            <h2 id="totalAllSalary">₪0</h2>
        </div>
        <div id="adminDataList"></div>
        <button class="btn" style="background:#2D3436; margin-top:20px;" onclick="showApp()">חזרה</button>
    </div>
</div>

<script>
    const CONFIG = { apiKey: "$2a$10$BIXzeiUj1VK8RV.YMZ4hNe7.GMH3.XNP2lSRhX/JrzfX2NidTZpNG", binId: "69d6000410716a4d5de597ef" };
    let db = {};
    let currentUser = null;

    async function init() {
        const status = document.getElementById('syncStatus');
        try {
            // שימוש ב-URL עם פרמטר משתנה כדי לעקוף Cache של Safari
            const response = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.binId}/latest?t=${Date.now()}`, {
                method: 'GET',
                headers: { 
                    'X-Master-Key': CONFIG.apiKey,
                    'Content-Type': 'application/json'
                }
            });

            if (!response.ok) throw new Error("Server Error");
            
            const data = await response.json();
            db = data.record;
            status.innerHTML = "✅ הנתונים נטענו!";
            renderUserSelect();
        } catch (e) {
            status.innerHTML = "❌ שגיאת חיבור. מנסה שוב בדרך אחרת...";
            // ניסיון נוסף ללא Headers מורכבים
            setTimeout(init, 3000);
        }
    }

    function renderUserSelect() {
        const sel = document.getElementById('userSelect');
        sel.innerHTML = Object.keys(db).map(n => `<option value="${n}">${n}</option>`).join('');
        document.getElementById('loginScreen').style.display = 'block';
        document.getElementById('appScreen').style.display = 'none';
        document.getElementById('adminScreen').style.display = 'none';
    }

    function login() {
        const n = document.getElementById('userSelect').value;
        const p = document.getElementById('pass').value;
        if (db[n] && db[n].password === p) {
            currentUser = n;
            showApp();
        } else alert("סיסמה שגויה");
    }

    function showApp() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminScreen').style.display = 'none';
        document.getElementById('appScreen').style.display = 'block';
        document.getElementById('userBadge').innerText = "שלום, " + currentUser;
        document.getElementById('workDate').value = new Date().toISOString().split('T')[0];
        
        const area = document.getElementById('adminLinkArea');
        if (currentUser === "אבי לביא") {
            area.innerHTML = `<button class="btn btn-admin" onclick="showAdminReport()">דוח ניהול עובדים 📊</button>`;
        } else { area.innerHTML = ""; }
        renderHistory();
    }

    function showAdminReport() {
        document.getElementById('appScreen').style.display = 'none';
        document.getElementById('adminScreen').style.display = 'block';
        const list = document.getElementById('adminDataList');
        let totalAll = 0;
        
        list.innerHTML = Object.keys(db).map(u => {
            const sh = db[u].shifts || [];
            const h = sh.reduce((a,b) => a+parseFloat(b.hours || 0), 0);
            const t = sh.reduce((a,b) => a+parseFloat(b.total || 0), 0);
            totalAll += t;
            return `<div class="admin-user-card card">
                <div class="admin-header"><b>${u}</b> <span style="font-size:12px;">🔑 ${db[u].password}</span></div>
                <div class="admin-stats">
                    <div class="stat-item"><small>שעות</small><div class="stat-val">${h.toFixed(2)}</div></div>
                    <div class="stat-item"><small>שכר</small><div class="stat-val" style="color:var(--secondary)">₪${t.toFixed(0)}</div></div>
                </div>
                <button class="btn" style="background:var(--primary); padding:8px; font-size:12px; margin-top:10px;" onclick="viewUser('${u}')">צפה במשמרות</button>
            </div>`;
        }).join('');
        document.getElementById('totalAllSalary').innerText = `₪${totalAll.toLocaleString()}`;
    }

    function viewUser(name) { currentUser = name; showApp(); }

    async function syncDB() {
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.binId}`, { 
                method: 'PUT', 
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': CONFIG.apiKey }, 
                body: JSON.stringify(db) 
            });
            document.getElementById('syncStatus').innerText = "✅ נשמר";
        } catch(e) { document.getElementById('syncStatus').innerText = "❌ תקלה בשמירה"; }
    }

    function saveShift() {
        const job = document.getElementById('jobName').value || "כללי";
        const date = document.getElementById('workDate').value, start = document.getElementById('startTime').value, end = document.getElementById('endTime').value;
        if (!date || !start || !end) return alert("מלא פרטים");
        const sT = new Date(`${date}T${start}`), eT = new Date(`${date}T${end}`);
        if (eT <= sT) eT.setDate(eT.getDate() + 1);
        let diff = (eT - sT) / 3600000;
        if (!db[currentUser].shifts) db[currentUser].shifts = [];
        db[currentUser].shifts.push({ id: Date.now(), job, date, start, end, hours: diff.toFixed(2), total: (diff * 52.29).toFixed(2) });
        renderHistory(); syncDB();
    }

    function renderHistory() {
        const sh = db[currentUser].shifts || [];
        document.getElementById('historyList').innerHTML = sh.map(s => `
            <div class="history-item">
                <div><b>${s.job}</b><br><small>${s.date}</small></div>
                <div><b>₪${s.total}</b> <button style="border:none; background:none;" onclick="deleteShift(${s.id})">🗑️</button></div>
            </div>`).reverse().join('');
    }

    function deleteShift(id) {
        if(confirm("למחוק?")) { db[currentUser].shifts = db[currentUser].shifts.filter(x => x.id !== id); renderHistory(); syncDB(); }
    }

    async function addUser() {
        const n = document.getElementById('newName').value.trim(), p = document.getElementById('newPass').value;
        if(n && p) { db[n] = { password: p, shifts: [] }; await syncDB(); renderUserSelect(); alert("נוצר!"); }
    }

    function logout() { currentUser = null; renderUserSelect(); }

    // הפעלה
    init();
</script>
</body>
</html>
