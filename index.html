<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WorkTime Pro Admin v3</title>
    <style>
        :root { --primary: #6C5CE7; --bg: #F0F3F7; --card: #FFFFFF; --danger: #FF7675; --secondary: #00B894; --text: #2D3436; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { 
            width: 100%;
            max-width: 500px; 
            padding: 15px;
            box-sizing: border-box;
        }

        .card { 
            background: var(--card); 
            border-radius: 20px; 
            padding: 18px; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.05); 
            margin-bottom: 15px; 
        }

        input, select { 
            width: 100%; 
            padding: 12px; 
            border-radius: 12px; 
            border: 1px solid #DDD; 
            margin-bottom: 10px; 
            box-sizing: border-box; 
            text-align: center; 
            font-size: 16px; 
            background: #fff;
        }

        /* עיצוב שורת זמן ותאריך */
        .time-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .time-row div { flex: 1; }
        .time-row label { display: block; font-size: 12px; color: var(--primary); font-weight: bold; margin-bottom: 4px; text-align: center; }

        .btn { 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            border: none; 
            font-weight: 800; 
            font-size: 16px; 
            cursor: pointer; 
            color: white; 
            margin-bottom: 8px; 
        }

        .btn-save { background: var(--primary); }
        .btn-danger { background: var(--danger); }
        .btn-admin { background: #2D3436; margin-top: 10px; }
        
        .admin-summary-all { background: #2d3436; color: white; padding: 15px; border-radius: 20px; text-align: center; margin-bottom: 15px; }
        .user-admin-box { border-right: 5px solid var(--primary); padding: 12px; margin-bottom: 12px; background: white; border-radius: 15px; position: relative; }
        
        #syncStatus { font-size: 10px; text-align: center; color: #888; margin-bottom: 8px; }
        #loginScreen, #appScreen, #adminScreen { display: none; width: 100%; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="syncStatus">🔄 טוען...</div>

    <div id="loginScreen">
        <h2 style="text-align:center; color:var(--primary);">WorkTime Pro</h2>
        <div class="card">
            <label>בחר עובד</label>
            <select id="userSelect"></select>
            <input type="password" id="pass" placeholder="סיסמה">
            <button class="btn btn-save" onclick="login()">כניסה</button>
            <hr style="opacity:0.1; margin:15px 0;">
            <input type="text" id="newName" placeholder="שם עובד חדש">
            <input type="password" id="newPass" placeholder="סיסמה לעובד">
            <button class="btn" style="background:var(--secondary)" onclick="addUser()">הוסף עובד למערכת</button>
        </div>
    </div>

    <div id="appScreen">
        <div class="header">
            <span id="userBadge" style="background:var(--primary); color:white; padding:5px 12px; border-radius:10px; font-weight:bold; font-size:14px;"></span>
            <button onclick="logout()" style="background:none; border:none; color:var(--danger); font-weight:bold;">יציאה ✖</button>
        </div>

        <div class="card">
            <label style="display:block; text-align:center; margin-bottom:5px; font-weight:bold;">פרטי משמרת</label>
            <input type="text" id="jobName" placeholder="מקום עבודה (למשל: סניף ראשי)">
            
            <div class="time-row">
                <div style="flex: 2;">
                    <label>תאריך</label>
                    <input type="date" id="workDate">
                </div>
                <div>
                    <label>כניסה</label>
                    <input type="time" id="startTime">
                </div>
                <div>
                    <label>יציאה</label>
                    <input type="time" id="endTime">
                </div>
            </div>

            <button class="btn btn-save" onclick="saveShift()">שמור משמרת</button>
            <div id="adminLinkArea"></div>
        </div>
        <div id="historyList"></div>
    </div>

    <div id="adminScreen">
        <div class="admin-summary-all">
            <small>סה"כ לתשלום לכולם</small>
            <h2 id="totalAllSalary" style="color:var(--secondary); margin:5px 0;">₪0</h2>
        </div>
        <div id="adminDataList"></div>
        <button class="btn" style="background:#2D3436;" onclick="showApp()">חזרה</button>
    </div>
</div>

<script>
    const CONFIG = { apiKey: "$2a$10$BIXzeiUj1VK8RV.YMZ4hNe7.GMH3.XNP2lSRhX/JrzfX2NidTZpNG", binId: "69d6000410716a4d5de597ef" };
    let db = JSON.parse(localStorage.getItem('wt_db') || '{"אבי לביא":{"password":"123","shifts":[]}}');
    let currentUser = null;

    async function init() {
        renderUserSelect();
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.binId}/latest?t=${Date.now()}`, {
                headers: { 'X-Master-Key': CONFIG.apiKey, 'X-Bin-Meta': 'false' }
            });
            if (res.ok) {
                db = await res.json();
                localStorage.setItem('wt_db', JSON.stringify(db));
                document.getElementById('syncStatus').innerText = "✅ מסונכרן";
                renderUserSelect();
            }
        } catch (e) { document.getElementById('syncStatus').innerText = "⚠️ מצב אופליין"; }
    }

    function renderUserSelect() {
        const sel = document.getElementById('userSelect');
        sel.innerHTML = Object.keys(db).map(n => `<option value="${n}">${n}</option>`).join('');
        document.getElementById('loginScreen').style.display = 'block';
    }

    function login() {
        const n = document.getElementById('userSelect').value, p = document.getElementById('pass').value;
        if (db[n] && db[n].password === p) { currentUser = n; showApp(); } else alert("טעות בסיסמה");
    }

    function showApp() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminScreen').style.display = 'none';
        document.getElementById('appScreen').style.display = 'block';
        document.getElementById('userBadge').innerText = currentUser;
        document.getElementById('workDate').value = new Date().toISOString().split('T')[0];
        
        const area = document.getElementById('adminLinkArea');
        area.innerHTML = (currentUser === "אבי לביא") ? `<button class="btn btn-admin" onclick="showAdminReport()">ניהול עובדים 📊</button>` : "";
        renderHistory();
    }

    function showAdminReport() {
        document.getElementById('appScreen').style.display = 'none';
        document.getElementById('adminScreen').style.display = 'block';
        const list = document.getElementById('adminDataList');
        let total = 0;
        
        list.innerHTML = Object.keys(db).map(u => {
            const sh = db[u].shifts || [], s = sh.reduce((a,b) => a + parseFloat(b.total || 0), 0);
            total += s;
            return `<div class="user-admin-box">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div><b>${u}</b> (🔑 ${db[u].password})<br>₪${s.toFixed(0)}</div>
                    <div style="display:flex; flex-direction:column; gap:5px;">
                        <button class="btn" style="background:var(--primary); padding:5px 10px; font-size:12px; margin:0;" onclick="viewUser('${u}')">צפה/ערוך</button>
                        <button class="btn" style="background:var(--danger); padding:5px 10px; font-size:12px; margin:0;" onclick="deleteUser('${u}')">מחק משתמש 🗑️</button>
                    </div>
                </div>
            </div>`;
        }).join('');
        document.getElementById('totalAllSalary').innerText = `₪${total.toLocaleString()}`;
    }

    async function deleteUser(name) {
        if(name === "אבי לביא") return alert("לא ניתן למחוק מנהל");
        if(confirm(`למחוק את ${name} לצמיתות? כל המשמרות שלו יימחקו!`)) {
            delete db[name];
            await syncDB();
            showAdminReport();
        }
    }

    function viewUser(name) { currentUser = name; showApp(); }

    async function syncDB() {
        localStorage.setItem('wt_db', JSON.stringify(db));
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.binId}`, { 
                method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': CONFIG.apiKey }, 
                body: JSON.stringify(db) 
            });
        } catch(e) {}
    }

    function saveShift() {
        const job = document.getElementById('jobName').value || "כללי", date = document.getElementById('workDate').value, start = document.getElementById('startTime').value, end = document.getElementById('endTime').value;
        if (!date || !start || !end) return alert("מלא פרטים");
        const sT = new Date(`${date}T${start}`), eT = new Date(`${date}T${end}`);
        if (eT <= sT) eT.setDate(eT.getDate() + 1);
        let diff = (eT - sT) / 3600000;
        if (!db[currentUser].shifts) db[currentUser].shifts = [];
        db[currentUser].shifts.push({ id: Date.now(), job, date, start, end, hours: diff.toFixed(2), total: (diff * 52.29).toFixed(2) });
        renderHistory(); syncDB();
    }

    function renderHistory() {
        const sh = db[currentUser].shifts || [];
        document.getElementById('historyList').innerHTML = sh.map(s => `
            <div class="card" style="display:flex; justify-content:space-between; margin-bottom:8px; padding:12px;">
                <div><b>${s.job}</b><br><small>${s.date}</small></div>
                <div>₪${s.total} <button style="border:none; background:none; color:red;" onclick="deleteShift(${s.id})">🗑️</button></div>
            </div>`).reverse().join('');
    }

    function deleteShift(id) {
        if(confirm("למחוק?")) { db[currentUser].shifts = db[currentUser].shifts.filter(x => x.id !== id); renderHistory(); syncDB(); }
    }

    async function addUser() {
        const n = document.getElementById('newName').value.trim(), p = document.getElementById('newPass').value;
        if(n && p) { db[n] = { password: p, shifts: [] }; await syncDB(); renderUserSelect(); alert("התווסף!"); }
    }

    function logout() { currentUser = null; document.getElementById('loginScreen').style.display='block'; document.getElementById('appScreen').style.display='none'; }

    init();
</script>
</body>
</html>
