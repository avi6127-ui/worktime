<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WorkTime Pro</title>
    <style>
        :root { --primary: #6C5CE7; --bg: #F0F3F7; --card: #FFFFFF; --danger: #FF7675; --secondary: #00B894; --text: #2D3436; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; min-height: 100vh; }
        .container { max-width: 500px; margin: auto; }
        .card { background: var(--card); border-radius: 20px; padding: 18px; box-shadow: 0 8px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h1, h2 { text-align: center; color: var(--primary); margin: 10px 0; }
        label { display: block; margin-bottom: 5px; font-weight: 700; color: var(--primary); font-size: 14px; text-align: center; }
        input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #DDD; margin-bottom: 12px; box-sizing: border-box; text-align: center; font-size: 16px; background: #FFF; -webkit-appearance: none; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; font-size: 16px; cursor: pointer; color: white; margin-bottom: 10px; }
        .btn-save { background: var(--primary); }
        .btn-admin { background: #2D3436; margin-top: 10px; }
        .history-item { background: var(--card); padding: 12px; border-radius: 15px; margin-bottom: 8px; border-right: 4px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        #syncStatus { font-size: 11px; text-align: center; color: #888; margin-bottom: 10px; height: 15px; font-weight: bold; }
        #loginScreen, #appScreen, #adminScreen { display: none; }
        .admin-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; align-items: center; }
        .badge { background: var(--primary); color: white; padding: 4px 10px; border-radius: 8px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div id="syncStatus">טוען...</div>

    <div id="loginScreen">
        <h1>WorkTime Pro</h1>
        <div class="card">
            <label>בחר משתמש</label>
            <select id="userSelect"></select>
            <input type="password" id="pass" placeholder="סיסמה">
            <button class="btn btn-save" onclick="login()">כניסה</button>
            <hr style="opacity:0.1; margin:20px 0;">
            <label>רישום עובד חדש</label>
            <input type="text" id="newName" placeholder="שם מלא">
            <input type="password" id="newPass" placeholder="סיסמה">
            <button class="btn" style="background:var(--secondary)" onclick="addUser()">צור חשבון</button>
        </div>
    </div>

    <div id="appScreen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <span class="badge" id="userBadge"></span>
            <button onclick="logout()" style="background:none; border:none; color:var(--danger); font-weight:bold; cursor:pointer;">יציאה ✖</button>
        </div>
        <div class="card">
            <label>תאריך</label>
            <input type="date" id="workDate">
            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label>כניסה</label><input type="time" id="startTime"></div>
                <div style="flex:1;"><label>יציאה</label><input type="time" id="endTime"></div>
            </div>
            <label>שכר שעתי (₪)</label>
            <input type="number" id="hourlyRate" value="50">
            <button class="btn btn-save" onclick="saveShift()">שמור משמרת</button>
            <div id="adminLinkArea"></div>
        </div>
        <div id="historyList"></div>
    </div>

    <div id="adminScreen">
        <h2>דוח מנהל</h2>
        <div class="card" id="adminDataList"></div>
        <button class="btn" style="background:#2D3436" onclick="showScreen('appScreen')">חזרה</button>
    </div>
</div>

<script>
    const CONFIG = {
        apiKey: "$2a$10$BIXzeiUj1VK8RV.YMZ4hNe7.GMH3.XNP2lSRhX/JrzfX2NidTZpNG",
        binId: "69d6000410716a4d5de597ef"
    };

    let db = JSON.parse(localStorage.getItem('wt_db') || "{}");
    let currentUser = null;
    const ADMIN_NAME = "אבי לביא";

    function updateSyncStatus(msg) { document.getElementById('syncStatus').innerText = msg; }

    function showScreen(id) {
        const screens = ['loginScreen', 'appScreen', 'adminScreen'];
        screens.forEach(s => {
            const el = document.getElementById(s);
            if (el) el.style.display = (s === id) ? 'block' : 'none';
        });
    }

    async function loadData() {
        // מציג מיד את המסך מהזיכרון המקומי
        renderLogin();
        updateSyncStatus("מתחבר לענן...");

        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.binId}/latest`, {
                headers: { 'X-Master-Key': CONFIG.apiKey }
            });
            const data = await res.json();
            if (data && data.record) {
                db = data.record;
                localStorage.setItem('wt_db', JSON.stringify(db));
                updateSyncStatus("✅ הנתונים סונכרנו");
                renderLogin();
            }
        } catch (e) { 
            updateSyncStatus("⚠️ עובד במצב מקומי");
        }
    }

    function renderLogin() {
        const names = Object.keys(db);
        const select = document.getElementById('userSelect');
        if (!select) return;
        select.innerHTML = names.map(n => `<option value="${n}">${n}</option>`).join('');
        if (names.length === 0) select.innerHTML = '<option disabled>אין משתמשים</option>';
        showScreen('loginScreen');
    }

    function login() {
        const n = document.getElementById('userSelect').value;
        const p = document.getElementById('pass').value;
        if (db[n] && db[n].password === p) {
            currentUser = n;
            showApp();
        } else alert("סיסמה שגויה");
    }

    function showApp() {
        showScreen('appScreen');
        document.getElementById('userBadge').innerText = currentUser;
        document.getElementById('workDate').value = new Date().toISOString().split('T')[0];
        
        const adminArea = document.getElementById('adminLinkArea');
        if (currentUser === ADMIN_NAME) {
            adminArea.innerHTML = `<button class="btn btn-admin" onclick="showAdminReport()">דוח מנהל 📊</button>`;
        } else {
            adminArea.innerHTML = "";
        }
        renderHistory();
    }

    async function saveShift() {
        const date = document.getElementById('workDate').value;
        const start = document.getElementById('startTime').value;
        const end = document.getElementById('endTime').value;
        const rate = parseFloat(document.getElementById('hourlyRate').value);
        
        if (!date || !start || !end) return alert("מלא פרטים");

        const newStart = new Date(`${date}T${start}`);
        let newEnd = new Date(`${date}T${end}`);
        if (newEnd <= newStart) newEnd.setDate(newEnd.getDate() + 1);

        // בדיקת חפיפה
        const existingShifts = db[currentUser].shifts || [];
        for (let s of existingShifts) {
            const sStart = new Date(`${s.date}T${s.start}`);
            let sEnd = new Date(`${s.date}T${s.end}`);
            if (sEnd <= sStart) sEnd.setDate(sEnd.getDate() + 1);
            if ((newStart < sEnd) && (newEnd > sStart)) {
                return alert(`⚠️ התנגשות: קיימת כבר משמרת ב-${s.date} בין ${s.start}-${s.end}`);
            }
        }

        const diff = (newEnd - newStart) / (1000 * 60 * 60);
        const total = (diff * rate + diff * 2.29).toFixed(2);
        
        if (!db[currentUser].shifts) db[currentUser].shifts = [];
        db[currentUser].shifts.push({ date, start, end, hours: diff.toFixed(2), total });

        localStorage.setItem('wt_db', JSON.stringify(db));
        renderHistory();
        
        try {
            updateSyncStatus("שומר בענן...");
            await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.binId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': CONFIG.apiKey },
                body: JSON.stringify(db)
            });
            updateSyncStatus("✅ נשמר");
        } catch(e) { updateSyncStatus("⚠️ נשמר מקומית"); }
    }

    function renderHistory() {
        const list = document.getElementById('historyList');
        const shifts = db[currentUser].shifts || [];
        list.innerHTML = shifts.map(s => `
            <div class="history-item">
                <div><b>${s.date.split('-').reverse().join('/')}</b><br><small>${s.start}-${s.end}</small></div>
                <div style="text-align:left;"><b style="color:var(--secondary)">₪${s.total}</b></div>
            </div>
        `).reverse().join('');
    }

    function showAdminReport() {
        showScreen('adminScreen');
        const list = document.getElementById('adminDataList');
        list.innerHTML = Object.keys(db).map(name => {
            const sum = (db[name].shifts || []).reduce((a, b) => a + parseFloat(b.total), 0);
            return `<div class="admin-row"><span><b>${name}</b></span><span>₪${sum.toFixed(2)}</span></div>`;
        }).join('');
    }

    function addUser() {
        const n = document.getElementById('newName').value.trim();
        const p = document.getElementById('newPass').value;
        if (!n || !p) return alert("מלא שם וסיסמה");
        db[n] = { password: p, shifts: [] };
        localStorage.setItem('wt_db', JSON.stringify(db));
        alert("✅ חשבון עבור " + n + " נוצר בהצלחה!");
        renderLogin();
    }

    function logout() { currentUser = null; location.reload(); }

    // הפעלה מיידית
    loadData();
</script>
</body>
</html>
