<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTime Pro</title>
    <style>
        body { font-family: sans-serif; background: #F0F3F7; margin: 0; padding: 20px; text-align: center; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; background: #6C5CE7; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        #sync { font-size: 12px; color: #888; margin-bottom: 10px; }
        .history-item { background: white; padding: 10px; margin-top: 10px; border-radius: 10px; border-right: 5px solid #6C5CE7; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="sync">טוען...</div>

    <div id="login" style="display:none;">
        <div class="card">
            <h2>WorkTime</h2>
            <select id="userSelect"></select>
            <input type="password" id="pass" placeholder="סיסמה">
            <button class="btn" onclick="login()">כניסה</button>
            <hr style="margin:20px 0; opacity:0.2;">
            <input type="text" id="newName" placeholder="עובד חדש">
            <input type="password" id="newP" placeholder="סיסמה">
            <button class="btn" style="background:#00B894" onclick="addUser()">צור חשבון</button>
        </div>
    </div>

    <div id="app" style="display:none;">
        <div class="card">
            <h3 id="uTitle"></h3>
            <input type="date" id="d"><br>
            <input type="time" id="s1"> עד <input type="time" id="s2">
            <input type="number" id="r" value="50" placeholder="שכר">
            <button class="btn" onclick="save()">שמור משמרת</button>
            <div id="adminBtn"></div>
            <button onclick="logout()" style="margin-top:10px; background:none; border:none; color:red; font-weight:bold;">יציאה</button>
        </div>
        <div id="list"></div>
    </div>

<script>
    const KEY = "$2a$10$BIXzeiUj1VK8RV.YMZ4hNe7.GMH3.XNP2lSRhX/JrzfX2NidTZpNG";
    const BIN = "69d6000410716a4d5de597ef";
    let db = {};
    let currentUser = null;

    async function load() {
        try {
            // טעינה מהירה מהזיכרון המקומי
            const local = localStorage.getItem('wt_db');
            if(local) { db = JSON.parse(local); renderLogin(); }

            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN}/latest`, {headers: {'X-Master-Key': KEY}});
            const data = await res.json();
            db = data.record || {};
            localStorage.setItem('wt_db', JSON.stringify(db));
            document.getElementById('sync').innerText = "✅ מסונכרן";
            renderLogin();
        } catch(e) {
            document.getElementById('sync').innerText = "עובד מקומית";
            renderLogin();
        }
    }

    function renderLogin() {
        document.getElementById('login').style.display = 'block';
        const s = document.getElementById('userSelect');
        const names = Object.keys(db);
        s.innerHTML = names.length ? names.map(n => `<option value="${n}">${n}</option>`).join('') : '<option>אין משתמשים</option>';
    }

    function login() {
        const n = document.getElementById('userSelect').value;
        const p = document.getElementById('pass').value;
        if(db[n] && db[n].password === p) { currentUser = n; showApp(); } 
        else alert("טעות");
    }

    function showApp() {
        document.getElementById('login').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('uTitle').innerText = currentUser;
        document.getElementById('d').value = new Date().toISOString().split('T')[0];
        document.getElementById('adminBtn').innerHTML = (currentUser === "אבי לביא") ? '<button class="btn" style="background:#333; margin-top:10px;" onclick="alert(JSON.stringify(db))">דו"ח מנהל</button>' : '';
        renderShifts();
    }

    async function save() {
        const date = document.getElementById('d').value;
        const s = document.getElementById('s1').value;
        const e = document.getElementById('s2').value;
        const rate = document.getElementById('r').value;
        if(!s || !e) return alert("מלא שעות");

        const shift = { date, s, e, total: (2 * rate).toFixed(2) }; // חישוב פשוט להדגמה
        if(!db[currentUser].shifts) db[currentUser].shifts = [];
        db[currentUser].shifts.push(shift);

        localStorage.setItem('wt_db', JSON.stringify(db));
        renderShifts();
        await fetch(`https://api.jsonbin.io/v3/b/${BIN}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json', 'X-Master-Key': KEY},
            body: JSON.stringify(db)
        });
    }

    function renderShifts() {
        const l = document.getElementById('list');
        const shifts = db[currentUser].shifts || [];
        l.innerHTML = shifts.map(s => `<div class="history-item"><span>${s.date}</span><b>${s.s}-${s.e}</b></div>`).reverse().join('');
    }

    function addUser() {
        const n = document.getElementById('newName').value;
        const p = document.getElementById('newP').value;
        if(n && p) { db[n] = {password: p, shifts: []}; renderLogin(); alert("נוצר!"); }
    }

    function logout() { location.reload(); }

    load();
</script>
</body>
</html>
