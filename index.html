<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WorkTime Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6C5CE7; --bg: #F0F3F7; --card: #FFFFFF; --danger: #FF7675; --secondary: #00B894; --text: #2D3436; }
        body { font-family: 'Assistant', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: env(safe-area-inset-top) 15px 40px 15px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: var(--card); border-radius: 25px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { text-align: center; color: var(--primary); }
        label { display: block; margin-bottom: 5px; font-weight: 700; text-align: center; color: var(--primary); }
        input, select { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #DDD; margin-bottom: 15px; box-sizing: border-box; text-align: center; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: 800; font-size: 16px; cursor: pointer; color: white; margin-bottom: 10px; }
        .btn-save { background: var(--primary); }
        .history-item { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; border-right: 5px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        #syncStatus { font-size: 11px; text-align: center; color: #888; margin-bottom: 10px; min-height: 15px; }
        .mini-btn { padding: 5px 10px; border-radius: 8px; border: none; color: white; font-size: 12px; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login" style="display:none;">
        <h1>WorkTime Pro</h1>
        <div class="card">
            <select id="userSelect"></select>
            <input type="password" id="pass" placeholder="סיסמה">
            <button class="btn btn-save" onclick="login()">כניסה</button>
            <hr><br>
            <input type="text" id="newName" placeholder="שם משתמש חדש">
            <input type="password" id="newPass" placeholder="סיסמה">
            <button class="btn" style="background:var(--secondary)" onclick="addUser()">יצירת משתמש</button>
        </div>
    </div>

    <div id="app" style="display:none;">
        <div id="syncStatus">טוען...</div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <b id="userNameLabel"></b>
            <button onclick="logout()" style="background:none; border:none; color:var(--danger); font-weight:bold;">יציאה</button>
        </div>
        
        <div class="card">
            <input type="hidden" id="editIndex" value="-1">
            <label>תאריך</label>
            <input type="date" id="workDate">
            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label>כניסה</label><input type="time" id="startTime"></div>
                <div style="flex:1;"><label>יציאה</label><input type="time" id="endTime"></div>
            </div>
            <label>שכר שעתי</label>
            <input type="number" id="hourlyRate" value="50">
            <button class="btn btn-save" id="mainBtn" onclick="saveShift()">שמור משמרת</button>
            <div id="adminArea"></div>
        </div>
        <div id="historyList"></div>
    </div>
</div>

<script>
    const CONFIG = {
        apiKey: "$2a$10$BIXzeiUj1VK8RV.YMZ4hNe7.GMH3.XNP2lSRhX/JrzfX2NidTZpNG",
        binId: "69d6000410716a4d5de597ef"
    };

    let db = JSON.parse(localStorage.getItem('wt_db') || "{}");
    let currentUser = null;
    const ADMIN_NAME = "אבי לביא";

    function updateSyncStatus(msg) { document.getElementById('syncStatus').innerText = msg; }

    async function saveToCloud() {
        localStorage.setItem('wt_db', JSON.stringify(db));
        updateSyncStatus("מגבה לענן...");
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.binId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': CONFIG.apiKey },
                body: JSON.stringify(db)
            });
            updateSyncStatus("✅ מסונכרן");
        } catch (e) { updateSyncStatus("⚠️ שגיאת סנכרון"); }
    }

    async function loadData() {
        // טעינה מיידית מהטלפון
        if (Object.keys(db).length > 0) init();
        
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.binId}/latest`, {
                headers: { 'X-Master-Key': CONFIG.apiKey }
            });
            const data = await res.json();
            if (data.record) {
                db = data.record;
                localStorage.setItem('wt_db', JSON.stringify(db));
                init();
                updateSyncStatus("✅ נתונים מעודכנים");
            }
        } catch (e) { updateSyncStatus("עובד במצב לא מקוון"); init(); }
    }

    function init() {
        const select = document.getElementById('userSelect');
        select.innerHTML = Object.keys(db).map(n => `<option value="${n}">${n}</option>`).join('');
        if (!currentUser) document.getElementById('login').style.display = 'block';
    }

    function login() {
        const n = document.getElementById('userSelect').value;
        const p = document.getElementById('pass').value;
        if (db[n] && db[n].password === p) {
            currentUser = n;
            showApp();
        } else alert("סיסמה שגויה");
    }

    function showApp() {
        document.getElementById('login').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('userNameLabel').innerText = currentUser;
        
        const now = new Date();
        document.getElementById('workDate').value = now.toISOString().split('T')[0];
        
        if (currentUser === ADMIN_NAME) {
            document.getElementById('adminArea').innerHTML = `<button class="btn" style="background:#444; margin-top:10px;" onclick="showAdminList()">פאנל ניהול</button>`;
        }
        renderHistory();
    }

    async function saveShift() {
        const date = document.getElementById('workDate').value;
        const start = document.getElementById('startTime').value;
        const end = document.getElementById('endTime').value;
        const rate = parseFloat(document.getElementById('hourlyRate').value);
        const editIdx = parseInt(document.getElementById('editIndex').value);

        if (!date || !start || !end) return alert("מלא את כל השדות");

        // בדיקת תאריך עתידי (רק אם זה באמת מחר)
        const today = new Date();
        today.setHours(0,0,0,0);
        const inputDate = new Date(date);
        if (inputDate > today) return alert("לא ניתן לרשום משמרת לעתיד");

        const sTime = new Date(`${date}T${start}`);
        let eTime = new Date(`${date}T${end}`);
        if (eTime <= sTime) eTime.setDate(eTime.getDate() + 1);

        const diff = (eTime - sTime) / (1000 * 60 * 60);
        const total = (diff * rate + diff * 2.29).toFixed(2);
        const shift = { date, start, end, hours: diff.toFixed(2), total };

        if (editIdx === -1) db[currentUser].shifts.push(shift);
        else db[currentUser].shifts[editIdx] = shift;

        await saveToCloud();
        document.getElementById('editIndex').value = "-1";
        document.getElementById('mainBtn').innerText = "שמור משמרת";
        renderHistory();
    }

    function renderHistory() {
        const list = document.getElementById('historyList');
        list.innerHTML = (db[currentUser].shifts || []).map((s, i) => `
            <div class="history-item">
                <div>
                    <b>${s.date.split('-').reverse().join('/')}</b><br>
                    <small>${s.start}-${s.end} (${s.hours} ש')</small>
                </div>
                <div>
                    <b style="color:var(--secondary)">₪${s.total}</b><br>
                    <button class="mini-btn" style="background:var(--danger)" onclick="deleteShift(${i})">מחק</button>
                </div>
            </div>
        `).reverse().join('');
    }

    function deleteShift(i) {
        if (confirm("למחוק?")) { db[currentUser].shifts.splice(i, 1); saveToCloud(); renderHistory(); }
    }

    function addUser() {
        const n = document.getElementById('newName').value.trim();
        const p = document.getElementById('newPass').value;
        if (!n || !p) return alert("מלא פרטים");
        if (db[n]) return alert("משתמש קיים");
        db[n] = { password: p, shifts: [] };
        saveToCloud(); init();
    }

    function logout() { currentUser = null; location.reload(); }

    function showAdminList() {
        let txt = "סיכום משתמשים:\n";
        Object.keys(db).forEach(name => {
            const sum = db[name].shifts.reduce((a, b) => a + parseFloat(b.total), 0);
            txt += `${name}: ₪${sum.toFixed(2)}\n`;
        });
        alert(txt);
    }

    loadData();
</script>
</body>
</html>
