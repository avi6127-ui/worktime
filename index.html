<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WorkTime Pro Fixed UI</title>
    <style>
        :root { --primary: #6C5CE7; --bg: #F0F3F7; --card: #FFFFFF; --danger: #FF7675; --secondary: #00B894; --text: #2D3436; }
        
        /* תיקון המרכזיות של כל הדף */
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 0; 
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { 
            width: 100%;
            max-width: 500px; 
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .card { 
            background: var(--card); 
            border-radius: 20px; 
            padding: 20px; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.05); 
            margin-bottom: 15px; 
            text-align: center; /* מוודא שכל התוכן בתוך הכרטיס ממורכז */
        }

        input, select { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: 1px solid #DDD; 
            margin-bottom: 12px; 
            box-sizing: border-box; 
            text-align: center; 
            font-size: 16px; 
        }

        .btn { 
            width: 100%; 
            padding: 16px; 
            border-radius: 12px; 
            border: none; 
            font-weight: 800; 
            font-size: 16px; 
            cursor: pointer; 
            color: white; 
            margin-bottom: 10px; 
        }

        .btn-save { background: var(--primary); }
        .btn-admin { background: #2D3436; margin-top: 15px; border: 2px solid var(--secondary); }
        
        /* דוח מנהל */
        .admin-summary-all { background: #2d3436; color: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        .admin-user-card { border-right: 6px solid var(--primary); padding: 15px; margin-bottom: 15px; background: white; border-radius: 15px; text-align: right; }
        
        #syncStatus { 
            font-size: 11px; 
            text-align: center; 
            color: #888; 
            margin-bottom: 10px; 
            padding: 8px; 
            background: #fff; 
            border-radius: 10px; 
            width: 100%;
        }

        #loginScreen, #appScreen, #adminScreen { display: none; width: 100%; }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div id="syncStatus">🔄 מתחבר למערכת...</div>

    <div id="loginScreen">
        <h1 style="text-align:center; color:var(--primary);">WorkTime Pro</h1>
        <div class="card">
            <label style="font-weight:bold; display:block; margin-bottom:10px;">בחר עובד</label>
            <select id="userSelect"></select>
            <input type="password" id="pass" placeholder="סיסמה">
            <button class="btn btn-save" onclick="login()">כניסה</button>
            <hr style="opacity:0.1; margin:20px 0;">
            <input type="text" id="newName" placeholder="שם עובד חדש">
            <input type="password" id="newPass" placeholder="סיסמה">
            <button class="btn" style="background:var(--secondary)" onclick="addUser()">פתח חשבון חדש</button>
        </div>
    </div>

    <div id="appScreen">
        <div class="header-row">
            <span id="userBadge" style="background:var(--primary); color:white; padding:6px 15px; border-radius:12px; font-weight:bold;"></span>
            <button onclick="logout()" style="background:none; border:none; color:var(--danger); font-weight:bold; cursor:pointer;">יציאה ✖</button>
        </div>

        <div class="card">
            <label>איפה עבדת?</label>
            <input type="text" id="jobName" placeholder="שם מקום העבודה">
            <label>תאריך</label>
            <input type="date" id="workDate">
            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label>כניסה</label><input type="time" id="startTime"></div>
                <div style="flex:1;"><label>יציאה</label><input type="time" id="endTime"></div>
            </div>
            <button class="btn btn-save" onclick="saveShift()">שמור משמרת</button>
            
            <div id="adminLinkArea"></div>
        </div>
        <div id="historyList"></div>
    </div>

    <div id="adminScreen">
        <div class="admin-summary-all">
            <small>סה"כ לתשלום (כל העובדים)</small>
            <h2 id="totalAllSalary" style="color:var(--secondary); margin:5px 0;">₪0</h2>
        </div>
        <div id="adminDataList"></div>
        <button class="btn" style="background:#2D3436; margin-top:20px;" onclick="showApp()">חזרה לתפריט</button>
    </div>
</div>

<script>
    const CONFIG = { apiKey: "$2a$10$BIXzeiUj1VK8RV.YMZ4hNe7.GMH3.XNP2lSRhX/JrzfX2NidTZpNG", binId: "69d6000410716a4d5de597ef" };
    // טעינה ראשונית מהזיכרון כדי שלא יהיה מסך לבן
    let db = JSON.parse(localStorage.getItem('wt_db') || '{"אבי לביא":{"password":"123","shifts":[]}}');
    let currentUser = null;

    async function init() {
        renderUserSelect();
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.binId}/latest?t=${Date.now()}`, {
                headers: { 'X-Master-Key': CONFIG.apiKey, 'X-Bin-Meta': 'false' }
            });
            if (res.ok) {
                db = await res.json();
                localStorage.setItem('wt_db', JSON.stringify(db));
                document.getElementById('syncStatus').innerText = "✅ מחובר לענן";
                renderUserSelect();
            }
        } catch (e) {
            document.getElementById('syncStatus').innerText = "⚠️ עובד במצב לא מקוון";
        }
    }

    function renderUserSelect() {
        const sel = document.getElementById('userSelect');
        sel.innerHTML = Object.keys(db).map(n => `<option value="${n}">${n}</option>`).join('');
        document.getElementById('loginScreen').style.display = 'block';
    }

    function login() {
        const n = document.getElementById('userSelect').value;
        const p = document.getElementById('pass').value;
        if (db[n] && db[n].password === p) {
            currentUser = n;
            showApp();
        } else alert("סיסמה שגויה");
    }

    function showApp() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminScreen').style.display = 'none';
        document.getElementById('appScreen').style.display = 'block';
        document.getElementById('userBadge').innerText = currentUser;
        document.getElementById('workDate').value = new Date().toISOString().split('T')[0];
        
        const area = document.getElementById('adminLinkArea');
        if (currentUser === "אבי לביא") {
            area.innerHTML = `<button class="btn btn-admin" onclick="showAdminReport()">ניהול עובדים 📊</button>`;
        } else { area.innerHTML = ""; }
        renderHistory();
    }

    function showAdminReport() {
        document.getElementById('appScreen').style.display = 'none';
        document.getElementById('adminScreen').style.display = 'block';
        const list = document.getElementById('adminDataList');
        let total = 0;
        
        list.innerHTML = Object.keys(db).map(u => {
            const sh = db[u].shifts || [];
            const h = sh.reduce((a,b) => a + parseFloat(b.hours || 0), 0);
            const s = sh.reduce((a,b) => a + parseFloat(b.total || 0), 0);
            total += s;
            return `<div class="admin-user-card card">
                <b>${u}</b> (סיסמה: ${db[u].password})<br>
                <span>${h.toFixed(2)} שעות | ₪${s.toFixed(0)}</span><br>
                <button class="btn" style="background:var(--primary); padding:5px; margin-top:10px; font-size:12px;" onclick="viewUser('${u}')">צפה/ערוך</button>
            </div>`;
        }).join('');
        document.getElementById('totalAllSalary').innerText = `₪${total.toLocaleString()}`;
    }

    function viewUser(name) { currentUser = name; showApp(); }

    async function syncDB() {
        localStorage.setItem('wt_db', JSON.stringify(db));
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.binId}`, { 
                method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': CONFIG.apiKey }, 
                body: JSON.stringify(db) 
            });
        } catch(e) {}
    }

    function saveShift() {
        const job = document.getElementById('jobName').value || "כללי";
        const date = document.getElementById('workDate').value, start = document.getElementById('startTime').value, end = document.getElementById('endTime').value;
        if (!date || !start || !end) return alert("מלא פרטים");
        const sT = new Date(`${date}T${start}`), eT = new Date(`${date}T${end}`);
        if (eT <= sT) eT.setDate(eT.getDate() + 1);
        let diff = (eT - sT) / 3600000;
        if (!db[currentUser].shifts) db[currentUser].shifts = [];
        db[currentUser].shifts.push({ id: Date.now(), job, date, start, end, hours: diff.toFixed(2), total: (diff * 52.29).toFixed(2) });
        renderHistory(); syncDB();
    }

    function renderHistory() {
        const sh = db[currentUser].shifts || [];
        document.getElementById('historyList').innerHTML = sh.map(s => `
            <div class="history-item card" style="display:flex; justify-content:space-between; text-align:right;">
                <div><b>${s.job}</b><br><small>${s.date}</small></div>
                <div><b>₪${s.total}</b> <button style="border:none; background:none;" onclick="deleteShift(${s.id})">🗑️</button></div>
            </div>`).reverse().join('');
    }

    function deleteShift(id) {
        if(confirm("למחוק?")) { db[currentUser].shifts = db[currentUser].shifts.filter(x => x.id !== id); renderHistory(); syncDB(); }
    }

    async function addUser() {
        const n = document.getElementById('newName').value.trim(), p = document.getElementById('newPass').value;
        if(n && p) { db[n] = { password: p, shifts: [] }; await syncDB(); renderUserSelect(); alert("עובד נוסף!"); }
    }

    function logout() { currentUser = null; document.getElementById('loginScreen').style.display='block'; document.getElementById('appScreen').style.display='none'; }

    init();
</script>
</body>
</html>
